name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "I searched for 'Tesla' and got a 500 error"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
      placeholder: "I expected to see Tesla's score and profile"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to the dashboard
        2. Search for 'Tesla'
        3. Press Enter
        4. See error
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "P0 — Everything is broken"
        - "P1 — Key feature broken"
        - "P2 — Feature degraded"
        - "P3 — Minor annoyance"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL where it happened
      placeholder: "http://localhost:8501/search?q=Tesla"
  - type: textarea
    id: logs
    attributes:
      label: Error logs (if any)
      placeholder: "Paste error messages from browser console or server logs"
      render: shell
