name: Sprint Bug
description: Report a bug that needs fixing
labels: ["type/bug"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - 🔴 Critical (data loss, security, production down)
        - 🟠 Major (feature broken, no workaround)
        - 🟡 Minor (feature degraded, workaround exists)
        - 🟢 Cosmetic (UI polish, typos)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Start the API server
        2. Call POST /api/search with query ""
        3. Observe 500 error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 14
        - Python: 3.12
        - Docker: 24.0
        - Branch: develop
        - Commit: abc1234
      value: |
        - OS:
        - Python: 3.12
        - Branch:
        - Commit:

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Stack Trace
      placeholder: "Paste relevant log output here"

  - type: dropdown
    id: regression
    attributes:
      label: Is this a regression?
      options:
        - "No — never worked before"
        - "Yes — worked in a previous version"
        - "Not sure"
