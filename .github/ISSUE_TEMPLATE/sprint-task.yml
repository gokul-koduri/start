name: Sprint Task
description: Create a sprint-tracked task (≤2 hours of work)
labels: ["type/task"]
body:
  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      description: Which sprint does this belong to?
      options:
        - Sprint 1 (Launch MVP)
        - Sprint 2 (Core Infrastructure)
        - Sprint 3 (Feedback + Analytics)
        - Sprint 4 (Auth + Security)
        - Sprint 5 (Watchlists + Alerts)
        - Sprint 6 (Export + Integrations)
        - Sprint 7 (Pro Tier + Billing)
        - Sprint 8 (Polish + V1 Release)
        - Backlog (Unscheduled)
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 (Critical — ship blocker)
        - P1 (Important — sprint goal)
        - P2 (Nice to have)
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - collectors
        - agents
        - api
        - scoring
        - nlp
        - dashboard
        - auth
        - db
        - monitoring
        - infrastructure
        - documentation
        - testing
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done? Be specific.
      placeholder: "As a user, I need X so that Y."
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done? List testable conditions.
      placeholder: |
        - [ ] Feature works as expected
        - [ ] Tests pass with ≥80% coverage
        - [ ] Documentation updated
        - [ ] No security issues
    validations:
      required: true

  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation Notes
      description: Technical approach, files to modify, dependencies.
      placeholder: |
        Files to create: ...
        Files to modify: ...
        Dependencies: ...
        Technical approach: ...

  - type: input
    id: effort
    attributes:
      label: Estimated Effort
      description: "Story points (Fibonacci: 1, 2, 3, 5, 8) or time estimate."
      placeholder: "3 points (~1-2 hours)"

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Tasks/issues that must be completed first.
      placeholder: "Blocked by #123, Depends on #456"
