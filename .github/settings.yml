# GitHub Repository Settings
# Apply with: gh api -X PUT repos/OWNER/REPO/branches/main/protection --input branch-protection.json
# Or use GitHub Settings app: https://github.com/apps/settings

branch_protection:
  main:
    required_pull_request_reviews:
      required_approving_review_count: 1
      dismiss_stale_reviews: true
      require_code_owner_reviews: false
    required_status_checks:
      strict: true
      contexts:
        - "Tests"
        - "Lint & Format"
        - "Security Scan"
        - "PR Validation"
        - "Sprint Gate Check"
    enforce_admins: false
    restrictions: null
    required_linear_history: false
    allow_force_pushes: false
    allow_deletions: false

  develop:
    required_pull_request_reviews:
      required_approving_review_count: 1
      dismiss_stale_reviews: true
    required_status_checks:
      strict: false
      contexts:
        - "Tests"
        - "Lint & Format"
        - "Security Scan"
    enforce_admins: false
    restrictions: null

