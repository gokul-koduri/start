name: Daily Standup Reminder

on:
  schedule:
    # Every weekday at 9:00 AM UTC
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  standup:
    name: Create Standup Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate standup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/agile_cli.py standup --ci

      - name: Create standup issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const { execSync } = require('child_process');

            // Read sprint tracker for current status
            let sprintInfo = '';
            try {
              sprintInfo = execSync('python scripts/sprint_validator.py 2>&1 || true').toString();
            } catch(e) {
              sprintInfo = 'Unable to read sprint status';
            }

            const body = `## 🏃 Daily Standup — ${today}

            ### Current Sprint Status
            \`\`\`
            ${sprintInfo}
            \`\`\`

            ### Three Questions
            - [ ] **What did I complete yesterday?**
            - [ ] **What am I working on today?**
            - [ ] **Any blockers?**

            ### Blockers
            <!-- List anything preventing progress -->

            ### Quick Metrics
            <!-- Update these from \`make sprint-status\` -->
            - Tests: ___ pass, ___ fail
            - Tasks done: ___ / ___
            - Sprint progress: ___%

            ---
            *This standup was auto-generated. Update and close when done.*
            *Command: \`python scripts/agile_cli.py standup\`*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🏃 Standup — ${today}`,
              body: body.replace(/^            /gm, ''),
              labels: ['type/chore', 'standup']
            });
