name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "requirements.txt"
  schedule:
    - cron: "0 6 * * 1"  # Monday 6 AM UTC
  workflow_dispatch:

jobs:
  bandit:
    name: Bandit (Python security linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet bandit
          pip install --quiet -r requirements.txt || true

      - name: Run Bandit
        run: |
          bandit -r . -x tests,.git,venv,.venv,node_modules \
            -f json -o bandit-results.json \
            --severity-level medium \
            || true
        continue-on-error: true

      - name: Run Bandit (human-readable)
        run: |
          bandit -r . -x tests,.git,venv,.venv,node_modules \
            -f custom \
            --severity-level medium \
            || true
        continue-on-error: true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results
          path: bandit-results.json

  pip-audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install --quiet pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt || true
        continue-on-error: true
