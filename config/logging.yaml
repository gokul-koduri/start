version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    filename: data/logs/collector.log
    maxBytes: 10485760
    backupCount: 5
    level: DEBUG
    formatter: standard
loggers:
  collectors:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  db:
    level: INFO
    handlers: [console, file]
    propagate: false
  report:
    level: INFO
    handlers: [console, file]
    propagate: false
root:
  level: INFO
  handlers: [console, file]
