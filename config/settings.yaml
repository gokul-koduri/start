# Startup Research Report - Data Collection Configuration
# Environment variables are referenced as ${VAR_NAME} and resolved at load time.

api:
  bls:
    base_url: "https://api.bls.gov/publicAPI/v2/timeseries/data/"
    api_key: "${BLS_API_KEY}"
    registration_url: "https://www.bls.gov/developers/"
    rate_limit:
      daily_default: 25
      daily_with_key: 500
      requests_per_minute: 10
  crunchbase:
    api_key: "${CRUNCHBASE_API_KEY}"
    enabled: false
  cb_insights:
    api_key: "${CB_INSIGHTS_API_KEY}"
    enabled: false

rss:
  google_news:
    base_url: "https://news.google.com/rss/search"
    queries:
      - query: "startup failed"
        params: "hl=en-US&gl=US&ceid=US:en"
      - query: "manufacturing startup bankruptcy"
        params: "hl=en-US&gl=US&ceid=US:en"
      - query: "startup shutdown funding"
        params: "hl=en-US&gl=US&ceid=US:en"
      - query: "EV startup bankruptcy 2024 OR 2025"
        params: "hl=en-US&gl=US&ceid=US:en"
      - query: "robotics company bankruptcy OR shutdown"
        params: "hl=en-US&gl=US&ceid=US:en"
      - query: "3D printing company bankruptcy OR shutdown"
        params: "hl=en-US&gl=US&ceid=US:en"
      - query: "battery manufacturing startup failed"
        params: "hl=en-US&gl=US&ceid=US:en"
  techcrunch:
    url: "https://techcrunch.com/feed/"

scraping:
  failory:
    base_url: "https://www.failory.com"
    failures_path: "/failures"
    cemetery_path: "/cemetery"
    category_pages:
      # Manufacturing & Hardware (highest relevance)
      - "/startups/robot-failures"
      - "/startups/software-hardware-failures"
      - "/startups/transportation-failures"
      # Finance & Fintech
      - "/startups/fintech-failures"
      - "/startups/crypto-failures"
      - "/startups/lack-of-funds-failures"
      - "/startups/mismanagement-of-funds-failures"
      # Technology
      - "/startups/artificial-intelligence-failures"
      - "/startups/saas-failures"
      - "/startups/analytics-failures"
      - "/startups/app-failures"
      - "/startups/web-app-failures"
      - "/startups/no-code-failures"
      # E-commerce & Marketplaces
      - "/startups/e-commerce-failures"
      - "/startups/marketplace-failures"
      - "/startups/fashion-failures"
      # Health & Education
      - "/startups/health-failures"
      - "/startups/edtech-failures"
      - "/startups/education-failures"
      - "/startups/food-beverage-failures"
      - "/startups/foodtech-failures"
      # Failure reasons
      - "/startups/no-market-need-failures"
      - "/startups/bad-business-model-failures"
      - "/startups/bad-management-failures"
      - "/startups/competition-failures"
      - "/startups/legal-challenges-failures"
      - "/startups/poor-product-failures"
      - "/startups/bad-timing-failures"
      - "/startups/lack-of-focus-failures"
      - "/startups/no-pivoting-failures"
      # Business models
      - "/startups/subscription-failures"
      - "/startups/b2b-failures"
      - "/startups/b2c-failures"
      - "/startups/community-failures"
      # Geography
      - "/startups/india-failures"
      - "/startups/united-states-failures"
      - "/startups/united-kingdom-failures"
      - "/startups/germany-failures"
      - "/startups/canada-failures"
      - "/startups/australia-failures"
      - "/startups/mexico-failures"
      - "/startups/new-york-failures"
      - "/startups/san-francisco-failures"
      - "/startups/london-failures"
      - "/startups/berlin-failures"
      - "/startups/silicon-valley-failures"
      - "/startups/los-angeles-failures"
      - "/startups/toronto-failures"
      - "/startups/sydney-failures"
      # Other
      - "/startups/blockchain-failures"
      - "/startups/music-failures"
      - "/startups/entertainment-failures"
      - "/startups/travel-failures"
      - "/startups/sports-failures"
      - "/startups/social-media-failures"
      - "/startups/design-failures"
      - "/startups/courses-failures"
      - "/startups/blog-failures"
      - "/startups/streaming-failures"
    max_pages: 20
    max_profiles: 500
    request_delay_seconds: 3
    user_agent: "StartupResearchBot/1.0 (educational research project; contact if issues)"

pdf:
  reshoring_initiative:
    base_url: "https://reshorenow.org"
    pdf_download_dir: "data/pdfs"
    known_pdfs:
      - url: "https://reshorenow.org/content/pdf/2024-1Q2025_RI_DATA_Report.pdf"
        report_year: 2024
        data_year: 2024

bls:
  # Legacy BLS API series (no longer used — BDS is Census data, not BLS).
  # Retained for reference. The collector now uses BLS BED Table 7 downloads.
  series:
    - id: "BD110021000000000000003"
      label: "Manufacturing establishment births"
      naics: "31-33"
      metric: "births"
  start_year: 2020
  end_year: 2025

bls_bed:
  # BLS Business Employment Dynamics — Table 7: Survival of private sector
  # establishments by opening year. Downloaded as fixed-width text files.
  # No API key required. Updated annually (~2 year lag).
  # Source: https://www.bls.gov/bdm/bdmage.htm
  naics_codes:
    - code: "31"
      label: "Manufacturing"
      store_as: "31-33"

classification:
  manufacturing_keywords:
    - manufacturing
    - factory
    - plant
    - production
    - battery
    - semiconductor
    - chip
    - 3d printing
    - robotics
    - ev
    - electric vehicle
    - automotive
    - supply chain
    - fabrication
    - assembly
    - industrial
    - steel
    - solar panel
    - textile
    - pharmaceutical
    - biomanufacturing
    - construction
    - modular
  failure_keywords:
    - failed
    - shut down
    - shutdown
    - bankruptcy
    - bankrupt
    - closed
    - collapsed
    - went under
    - ceased operations
    - laid off
    - chapter 11
    - liquidation
    - went bust
    - insolvency
    - winding down

report:
  output_path: "Failed_Startups_Manufacturing_Revival_Report.md"
  include_sources_section: true
  include_methodology_section: true
  min_startups_for_region_section: 3
  manufacturing_highlight_threshold: 5

# Ollama LLM configuration — shared by all agents via ModelManager
ollama:
  base_url: "http://localhost:11434"
  models:
    default: "llama3"
    sentiment: "llama3.2:1b"
    ner: "llama3"
    summarization: "llama3"
    failure_analysis: "llama3"
    classification: "llama3"
    chat: "llama3"

# Agent pipeline configuration
agents:
  orchestrator:
    enabled: true
    continue_on_failure: true
    pipelines:
      daily:
        - collection
        - report
        - span_monitor
        - dashboard
        - git_publisher
      weekly:
        - feedback_analyzer       # Sprint 3: analyze feedback before weekly run
        - llm_pricing
        - llm_benchmark
        - llm_portfolio
        - llm_cost_optimizer
        - alert_dispatcher
        - knowledge_graph
        - internet_research
        - collection
        - report
        - report_generator
        - span_monitor
        - dashboard
        - git_publisher
      dev-team:
        - product_manager
        - business_analyst
        - solution_architect
        - ux_designer
        - software_engineer
        - qa_engineer
        - devops_engineer
      collect-only:
        - collection
      report-only:
        - report
      publish-only:
        - license_manager
        - dashboard
        - git_publisher
      analysis:
        - failure_pattern
        - survival_analysis
        - revival_opportunity
        - geographic_strategy
        - news_intelligence
        - whale_investor
        - opportunity_pipeline
        - correlation
        - global_market_viability
        - risk_scorer
        - sentiment
        - ml_predictor
        - llm_pricing
        - llm_benchmark
        - llm_portfolio
        - llm_cost_optimizer
        - entity_resolver
        - nlp_enrichment
        - knowledge_graph
      full:
        - collection
        - report
        - failure_pattern
        - survival_analysis
        - revival_opportunity
        - geographic_strategy
        - news_intelligence
        - whale_investor
        - opportunity_pipeline
        - correlation
        - global_market_viability
        - knowledge_graph
        - alert_dispatcher
        - stripe_payments
        - report_generator
        - span_monitor
        - dashboard
        - git_publisher

  collection:
    enabled: true
    daily_collectors:
      - google_news_rss
      - techcrunch_rss

  report:
    enabled: true
    only_on_new_data: true

  dashboard:
    enabled: true
    include_charts: true
    site_dir: "site"

  git_publisher:
    enabled: true
    repo_url: "${GITHUB_REPO}"
    branch: main
    pages_branch: gh-pages
    commit_message_template: "Automated report update - {timestamp}"

  internet_research:
    enabled: true
    queries:
      - "startup failure database open data"
      - "failed startups API data source"
      - "manufacturing bankruptcy statistics data"
      - "reshoring statistics open data"
      - "startup cemetery graveyard list"
      - "manufacturing startup failure rate data"
    max_results_per_query: 20
    validation:
      timeout_seconds: 10
      min_content_length: 500
      relevance_threshold: 0.3

  whale_investor:
    enabled: true
    queries:
      # Greenfield-capacity queries (where 62.6% of mega investment actually flows)
      - "semiconductor fab greenfield investment 2025 funding"
      - "battery gigafactory new construction investment 2025"
      - "CHIPS Act funded projects greenfield construction 2025"
      - "EV factory new plant investment venture capital 2025"
      - "manufacturing greenfield mega project private equity 2025"
      # Strategic investor / sovereign wealth activity
      - "sovereign wealth fund semiconductor manufacturing investment"
      - "IRA Inflation Reduction Act manufacturing investment 2024 2025"
      # Some distressed acquisition coverage (smaller share of activity)
      - "private equity acquisition distressed manufacturing assets"
      - "failed manufacturing startup acquired PE firm"
    max_results_per_query: 15
    validation:
      timeout_seconds: 10
      min_content_length: 500
      relevance_threshold: 0.3

  global_market_viability:
    enabled: true
    ollama_url: "http://localhost:11434/api/chat"
    ollama_model: "llama3"
    delay_seconds: 3.0
    top_combinations: 15
    output_filename: "Global_Market_Viability.md"

  llm_pricing:
    enabled: true
    request_delay_seconds: 2
    timeout_seconds: 15

  llm_benchmark:
    enabled: true
    timeout_seconds: 20
    request_delay_seconds: 2

  llm_portfolio:
    enabled: true
    allocation_weights:
      primary: 0.70
      secondary: 0.20
      tertiary: 0.10

  llm_cost_optimizer:
    enabled: true
    price_change_threshold: 0.05
    quality_match_threshold: 0.85
    max_alerts: 20

  license_manager:
    enabled: true
    generate_keys: 0
    default_tier: pro
    key_expiry_days: 365
    stripe_pro_url: "${STRIPE_PRO_URL}"
    stripe_enterprise_url: ""

  knowledge_graph:
    enabled: true
    ollama_url: "http://localhost:11434/api/chat"
    ollama_model: "llama3"
    delay_seconds: 1.0
    batch_size: 50

  ai_analyst:
    enabled: true
    ollama_url: "http://localhost:11434/api/chat"
    ollama_model: "llama3"
    timeout_seconds: 120
    max_context_exchanges: 3

  alert_dispatcher:
    enabled: true
    channels:
      email: { enabled: false, smtp_host: "${SMTP_HOST}", smtp_port: 587, smtp_user: "${SMTP_USER}", smtp_password: "${SMTP_PASSWORD}", from_address: "${SMTP_FROM}", to_addresses: [] }
      webhook_slack: { enabled: false, url: "${SLACK_WEBHOOK_URL}" }
      webhook_discord: { enabled: false, url: "${DISCORD_WEBHOOK_URL}" }
      webhook_custom: { enabled: false, url: "${CUSTOM_WEBHOOK_URL}" }
    max_alerts_per_run: 50

  email_digest:
    enabled: true
    template: "digest.html"
    max_recipients: 500

  email_worker:
    enabled: true
    batch_size: 50
    delay_between_emails: 0.5
    loop_interval_seconds: 30

  report_generator:
    enabled: true
    output_dir: "data/reports"
    output_formats:
      - markdown
      - html
    email_delivery: { enabled: false }  # No longer needs SMTP config — uses email_worker queue

  stripe_payments:
    enabled: false
    stripe_secret_key: "${STRIPE_SECRET_KEY}"
    poll_hours_back: 24

  span_monitor:
    enabled: true
    lookback_days: 7
    anomaly_thresholds:
      duration_multiplier: 2.0
      failure_rate_pct: 10.0
      data_drop_pct: 50.0

  sentiment:
    enabled: true
    mode: "fast"
    batch_size: 100

  ml_predictor:
    enabled: true
    min_training_samples: 50
    model_output_dir: "data/models"

# Real-time dashboard configuration
realtime:
  enabled: true
  poll_interval_seconds: 30

# Phase 2: NLP Pipeline configuration
nlp:
  enabled: true
  spacy_model: "en_core_web_trf"
  embedding_model: "all-MiniLM-L6-v2"
  device: "cpu"
  batch_size: 32
  confidence_threshold: 0.7
  summarization:
    max_length: 200

# Phase 2: Patent collector configuration
patents:
  enabled: true
  queries:
    - query: "artificial intelligence startup"
      classification: "G06N"
    - query: "machine learning model"
      classification: "G06N"
    - query: "semiconductor chip"
      classification: "H01L"
    - query: "battery technology electric vehicle"
      classification: "H01M"
  max_results_per_query: 50
  lookback_days: 30

# Phase 2: Social media collector configuration
social_media:
  enabled: true
  reddit:
    subreddits:
      - "startups"
      - "technology"
      - "programming"
      - "SaaS"
      - "machinelearning"
      - "artificial"
    post_limit: 100
    min_score: 10
  hacker_news:
    queries:
      - "startup funding"
      - "AI company"
      - "new product launch"
    max_results: 50
  lookback_hours: 24

# Phase 4: GitHub Deep Collector
github_deep:
  enabled: true
  api:
    base_url: "https://api.github.com"
    token: "${GITHUB_TOKEN}"
    rate_limit:
      requests_per_minute: 60
  search_queries:
    - "created:>{since} stars:>50 language:python topic:ai"
    - "created:>{since} stars:>50 topic:llm topic:agent"
    - "created:>{since} stars:>100 topic:startup topic:saas"
  detail_endpoints:
    commits: true
    contributors: true
    releases: true
    lookback_days: 30
  min_stars: 50

# Phase 4: Reddit Stream Collector
reddit_stream:
  enabled: true
  subreddits:
    - "startups"
    - "technology"
    - "programming"
    - "SaaS"
    - "machinelearning"
    - "artificial"
    - "entrepreneur"
  stream_timeout: 30
  max_posts: 50
  min_score: 10
  comment_limit: 5
  collect_comments: true

# Phase 4: HN Live Collector
hn_live:
  enabled: true
  firebase:
    base_url: "https://hacker-news.firebaseio.com/v0"
  algolia:
    base_url: "https://hn.algolia.com/api/v1"
  max_stories: 50
  min_points: 5
  comment_limit: 5
  collect_comments: true

# Phase 4: OpenCorporates Collector
opencorporates:
  enabled: true
  api_token: "${OPENCORPORATES_API_TOKEN}"
  base_url: "https://api.opencorporates.com/v0.4"
  rate_limit:
    requests_per_day: 50
  search_queries:
    - query: "AI startup"
      jurisdictions: ["us", "gb", "de"]
    - query: "machine learning"
      jurisdictions: ["us", "gb"]
    - query: "fintech"
      jurisdictions: ["us", "gb", "sg"]
  per_page: 30
  min_delay_seconds: 2

# Phase 4: arXiv Collector
arxiv:
  enabled: true
  base_url: "http://export.arxiv.org/api/query"
  max_results_per_query: 50
  min_delay_seconds: 3
  search_queries:
    - terms: "machine learning"
      categories: ["cs.AI", "cs.LG"]
    - terms: "large language model"
      categories: ["cs.CL", "cs.AI"]
    - terms: "computer vision"
      categories: ["cs.CV", "cs.AI"]
    - terms: "reinforcement learning"
      categories: ["cs.LG", "stat.ML"]

# Phase 4: Product Hunt Collector
producthunt:
  enabled: true
  api_token: "${PRODUCTHUNT_API_TOKEN}"
  base_url: "https://api.producthunt.com/v2/api/graphql"
  posts_per_request: 50
  min_delay_seconds: 5
  max_requests: 5
  topic_filter:
    - "ai"
    - "developer-tools"
    - "saas"
    - "no-code"
    - "open-source"

# Phase 4: Website Monitor Collector
website_monitor:
  enabled: true
  timeout_seconds: 15
  user_agent: "StartupResearchBot/1.0"
  min_delay_seconds: 2
  signal_keywords:
    funding:
      - "raised"
      - "funding"
      - "series a"
      - "series b"
      - "investment"
      - "seed round"
    hiring:
      - "we're hiring"
      - "careers"
      - "join our team"
      - "open positions"
    launch:
      - "now available"
      - "launching"
      - "public beta"
      - "early access"
    pricing:
      - "pricing"
      - "plans starting at"
  watch_urls: []

# Phase 4: Twitter/X Collector (Nitter RSS)
twitter:
  enabled: true
  nitter_instances:
    - "https://nitter.net"
    - "https://nitter.privacydev.net"
  search_queries:
    - "startup funding"
    - "new product launch"
    - "series A announcement"
  timeout_seconds: 15
  min_delay_seconds: 3

# Phase 4: Stack Overflow Collector
stackoverflow:
  enabled: true
  base_url: "https://api.stackexchange.com/2.3"
  search_queries:
    - terms: "startup SaaS deployment"
      tags: ["deployment", "saas"]
      min_score: 5
    - terms: "machine learning production"
      tags: ["machine-learning", "production"]
      min_score: 10
    - terms: "scaling microservices architecture"
      tags: ["microservices", "architecture"]
      min_score: 5
  max_results_per_query: 50
  min_delay_seconds: 2
  site: "stackoverflow"
  timeout_seconds: 15

# Phase 4: NPM/PyPI Trends Collector
npm_pypi:
  enabled: true
  packages:
    - name: "next"
      registry: "npm"
    - name: "express"
      registry: "npm"
    - name: "fastapi"
      registry: "pypi"
    - name: "langchain"
      registry: "pypi"
    - name: "ollama"
      registry: "npm"
  timeout_seconds: 15
  min_delay_seconds: 1

# Phase 4: Regulatory Filings Collector (SEC EDGAR)
regulatory:
  enabled: true
  base_url: "https://www.sec.gov/cgi-bin/browse-edgar"
  search_companies:
    - "AI startup"
    - "tech company"
  filing_types: ["S-1", "8-K", "SC 13D"]
  max_results_per_query: 40
  min_delay_seconds: 3
  user_agent: "StartupResearchBot/1.0 (educational research project)"

# Phase 4: Newsletter Aggregation Collector
newsletter:
  enabled: true
  sources:
    - "https://example.com/newsletter-archive"
    - "https://techdigest.com/daily"
  timeout_seconds: 15
  min_delay_seconds: 2

# Phase 2: Qdrant vector database
qdrant:
  url: "${QDRANT_URL:-http://localhost:6333}"
  collection_name: "startup_signals"
  embedding_dim: 384
  batch_size: 100

# Phase 2: Elasticsearch
elasticsearch:
  url: "${ELASTICSEARCH_URL:-http://localhost:9200}"
  index_name: "startup_research"
  batch_size: 100

# Phase 3: ClickHouse (OLAP Analytics)
clickhouse:
  url: "${CLICKHOUSE_URL:-http://localhost:8123}"
  database: startup_analytics
  batch_size: 1000
  # Tables auto-created on connect:
  # signal_events, trend_metrics, cohort_analysis

# Phase 3: TimescaleDB (Time-Series)
timescaledb:
  url: "${TIMESCALEDB_URL:-postgresql://startup:${TIMESCALEDB_PASSWORD}@localhost:5433/startup_timeseries}"
  # Hypertables auto-created on connect:
  # signal_metrics, anomaly_scores, engagement_trends

# Phase 3: Redis (Cache + Pub/Sub)
redis:
  url: "${REDIS_URL:-redis://localhost:6379/0}"
  ttl:
    stats: 60         # DB count queries cache
    opportunities: 120  # Opportunity list cache
    search: 300        # Search results cache
    embeddings: 3600   # Embedding similarity cache

# Phase 3: Stream Processing (Bytewax)
stream:
  workers: 1
  batch_size: 100
  topics:
    raw: raw.signals
    enriched: enriched.signals
    scores: scores.updates
    graph: graph.events
    alerts: alerts.triggered

# Sprint 2: Collector Scheduler
scheduler:
  groups:
    # Fast collectors: news, RSS, social — every 2 hours
    fast:
      interval_minutes: 120
      collectors:
        - google_news_rss
        - techcrunch_rss
        - hn_live
        - reddit_stream
        - twitter
    # Standard collectors: data sources — every 6 hours
    standard:
      interval_minutes: 360
      collectors:
        - github_deep
        - stackoverflow
        - producthunt
        - arxiv
        - npm_pypi
        - newsletter
        - website_monitor
    # Slow collectors: scrapers, APIs — daily
    daily:
      interval_minutes: 1440
      collectors:
        - bls_survival_rates
        - failory_scraper
        - reshoring_pdf
        - opencorporates
        - regulatory
        - sec_edgar
  collector_timeout: 300
  max_concurrent: 3
  retry:
    max_attempts: 3
    backoff_seconds: [30, 60, 120]

# ── Authentication & Security (Sprint 4) ──
auth:
  jwt_secret: "${JWT_SECRET}"
  jwt_expiry_hours: 24
  bcrypt_rounds: 12
  rate_limit_per_minute: 60
  max_api_keys_per_user: 10
  password_min_length: 8
