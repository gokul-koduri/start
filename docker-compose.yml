version: "3.8"

services:
  # ── MySQL Database ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: startup-research-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-startup2024}
      MYSQL_DATABASE: startup_research
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-startup2024}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Ollama (Local LLM) ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: startup-research-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── API Server ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: startup-research-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-startup2024}
      MYSQL_DATABASE: startup_research
      OLLAMA_URL: http://ollama:11434/api/chat
      BLS_API_KEY: ${BLS_API_KEY:-}
      LOG_LEVEL: INFO
    depends_on:
      mysql:
        condition: service_healthy
    command: python api_server.py --host 0.0.0.0 --port 8000

  # ── Streamlit Dashboard ───────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: startup-research-streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-startup2024}
      MYSQL_DATABASE: startup_research
    depends_on:
      mysql:
        condition: service_healthy
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true

  # ── Daily Pipeline (scheduled via cron within container) ────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: startup-research-pipeline
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-startup2024}
      MYSQL_DATABASE: startup_research
      OLLAMA_URL: http://ollama:11434/api/chat
      BLS_API_KEY: ${BLS_API_KEY:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      LOG_LEVEL: INFO
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./site:/app/site
    entrypoint: []
    command: >
      sh -c "
        python seed_data.py &&
        echo 'Pipeline ready. Running daily at 8 AM...' &&
        while true; do
          HOUR=$$(date +%H);
          if [ $$HOUR = '08' ]; then
            echo \"[$$(date)] Running daily pipeline...\";
            python run_agent.py --pipeline daily;
          fi;
          sleep 3600;
        done
      "

  # ── Stream Processor (Bytewax real-time pipeline) ──────
  stream_processor:
    build: .
    container_name: startup-research-stream
    restart: unless-stopped
    command: python -m stream.pipeline
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-startup2024}
      MYSQL_DATABASE: startup_research
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      ALERT_THRESHOLD: "80"
      WINDOW_SECONDS: "300"
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./site:/app/site

volumes:
  mysql_data:
  ollama_data:
  redis_data:
  kafka_data:
  qdrant_data:
  elasticsearch_data:
  clickhouse_data:
  timescaledb_data:
  caddy_data:
  caddy_config:

  # ── Redis (Cache + Pub/Sub) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: startup-research-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (Redpanda — Kafka-compatible, simpler deploy) ──
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: startup-research-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovision
      - --node-id 0
      - --kafka-addr 0.0.0.0:9092
      - --advertise-kafka-addr kafka:9092
      - --rpc-addr 0.0.0.0:33122
      - --advertise-rpc-addr kafka:33122
    ports:
      - "9092:9092"
      - "33122:33122"
    volumes:
      - kafka_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy|under-replication'" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Qdrant (Vector Search) ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: startup-research-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch (Full-Text Search) ──────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: startup-research-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── ClickHouse (OLAP Analytics) ─────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: startup-research-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── TimescaleDB (Time-Series) ──────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: startup-research-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: startup
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD:-startup2024}
      POSTGRES_DB: startup_timeseries
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U startup -d startup_timeseries"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Caddy (Reverse Proxy + Auto HTTPS) ──────────────
  caddy:
    image: caddy:2-alpine
    container_name: startup-research-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - streamlit
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@example.com}
